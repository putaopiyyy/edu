<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国教育考试网</title>
    <style>
        body {
            background-color: #f0f2f5;
            margin: 0;

            display: flex;
            justify-content: center;
            align-items: flex-start;
            font-family: sans-serif;

        }

        .container {
            width: 100%;
            max-width: 600px;
            background-color: #fff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        /* 顶部标题栏模拟 */
        .header {
            background-color: #2e5b9e;
            /* 深蓝色 */
            color: white;
            padding: 15px 20px;
            text-align: center;
            font-size: 18px;
            position: relative;
        }

        .header .back {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 24px;
            color: white;
        }

        .header .menu {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: white;
        }

        .banner {
            background-color: #003f7d;
            color: white;
            padding: 10px 20px;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            letter-spacing: 1px;
        }

        .sub-title {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: #000;
            margin-top: 20px;
            letter-spacing: 2px;
            
        }

        .verify-btn {
            display: block;
            width: 30%;

            padding: 2px 10px;
            background: linear-gradient(to right, #657fed, #4cabff);
            color: white;
            border: none;
            border-top-right-radius: 10px;
            border-bottom-right-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            text-align: center;
            margin: 10px 0;
        }

        .profile-pic {
            display: block;
            width: 120px;
            height: 150px;
            margin: 0 auto 20px;
            border: 2px solid #eee;
            background-color: #fafafa;
            object-fit: cover;
        }

        .ul {
            /* background: url(./微信图片_20260513164815_253_177.png)  center no-repeat;
            background-size: contain; */
            position: relative;
            margin: 15px;
            border: 1px solid #ebedf0;
            padding: 0 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border-radius: 6px;
         
            /* box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05); */
        }

        /* 核心：水印伪元素 */
        .ul::after {
            content: "";
            position: absolute;
            inset: 30px;
            /* 上下左右都为0，铺满整个容器 */
            background: url("./bg.png");
            background-repeat: no-repeat;
            /* 不重复 */
            background-position: center;
            /* 水平+垂直都居中 */
            background-size: contain;
            opacity: 0.11;
            /* 控制透明度，越低越淡，文字越清晰 */
            pointer-events: none;
            /* 不影响文字的点击/选择 */
            z-index: 0;
            /* 让水印在文字下方 */
            /* top: 300px; */
        }

        .ul>div {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #eeeeee;
            padding: 10px 0;
            font-size: 14px;
            color: #6d6d6d
        }

        .title {
            font-weight: 500;
            color: #000000;
        }
        .text{
            font-size: 13px;
            color: #6d6d6d;
            margin: 0 15px;
        }
    </style>
</head>

</body>
<script>
      // 获取元素
    const timeEl = document.getElementById('currentTime');
     const date = new Date();
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, '0');
  const day = String(date.getDate()).padStart(2, '0');
  const hours = String(date.getHours()).padStart(2, '0');
  const minutes = String(date.getMinutes()).padStart(2, '0');
  const seconds = String(date.getSeconds()).padStart(2, '0');
timeEl.innerText = `验证时间:${year}年${month}月${day}日${hours}:${minutes}:${seconds}`;
</script>

</html>
